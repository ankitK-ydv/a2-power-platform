<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login - A² POWER</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
      <a class="brand login-brand" href="/" aria-label="A squared POWER home">
        <span class="brand-mark">A²</span>
        <span class="brand-copy">POWER</span>
      </a>
      <p class="eyebrow">Secure access</p>
      <h1 id="login-title">Admin Login</h1>
      <p class="muted">Enter your admin password to view orders and project details.</p>
      <form id="login-form" class="login-form">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />
        <button class="btn primary" type="submit">Login</button>
      </form>
      <div id="msg" class="muted login-message"></div>
    </section>
  </main>
  <script src="/js/admin-auth.js"></script>
</body>
</html>
