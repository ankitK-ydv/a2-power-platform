<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Project Details | A² POWER</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/" aria-label="A squared POWER home">
        <span class="brand-mark">A²</span>
        <span class="brand-copy">POWER</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/about.html">About</a>
        <a href="/pricing.html">Pricing</a>
        <a href="/portfolio.html">Portfolio</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container narrow">
        <p class="eyebrow">Project brief</p>
        <h1>Tell us what your selected website needs.</h1>
        <p>Share your business details before payment so your package, payment details, and brief reach the admin together.</p>
      </div>
    </section>

    <section class="section container">
      <form id="client-form">
        <label>Name <input id="name" name="name" required /></label>
        <label>Business Name <input id="businessName" name="businessName" /></label>
        <label>Phone <input id="phone" name="phone" required /></label>
        <label>Website Type <input id="websiteType" name="websiteType" /></label>
        <label>Number of pages <input id="pages" name="pages" type="number" /></label>
        <label>Reference Website <input id="referenceWebsite" name="referenceWebsite" /></label>
        <label>Extra requirements <textarea id="extraRequirements" name="extraRequirements"></textarea></label>
        <button type="submit" class="btn primary">Continue to Payment</button>
      </form>
      <div id="msg" class="muted"></div>
    </section>
  </main>

  <script src="/js/form.js"></script>
</body>
</html>
